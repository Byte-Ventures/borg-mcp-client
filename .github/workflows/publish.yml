name: Publish to npm

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing immutable release tag to verify without publishing
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Reject checked-out repository npm config
        shell: bash
        run: test ! -e .npmrc

      - name: Set up exact Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org

      - name: Set up exact npm
        shell: bash
        run: |
          set -euo pipefail
          npm_prefix="${RUNNER_TEMP}/npm-11.18.0"
          bootstrap_userconfig="${RUNNER_TEMP}/npm-bootstrap.npmrc"
          bootstrap_cache="${RUNNER_TEMP}/npm-bootstrap-cache"
          : > "${bootstrap_userconfig}"
          NPM_CONFIG_USERCONFIG="${bootstrap_userconfig}" NPM_CONFIG_CACHE="${bootstrap_cache}" \
            npm install --prefix "${npm_prefix}" --ignore-scripts --no-save \
            --registry=https://registry.npmjs.org npm@11.18.0
          exact_npm="${npm_prefix}/node_modules/.bin/npm"
          test "$(NPM_CONFIG_USERCONFIG="${bootstrap_userconfig}" "${exact_npm}" --version)" = "11.18.0"
          test "$(NPM_CONFIG_USERCONFIG="${bootstrap_userconfig}" "${exact_npm}" config get registry)" = "https://registry.npmjs.org/"
          echo "${npm_prefix}/node_modules/.bin" >> "${GITHUB_PATH}"

      - name: Verify release source and tag
        id: release
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          set -euo pipefail
          test "$(node --version)" = "v22.22.2"
          test "$(npm --version)" = "11.18.0"
          test "${GITHUB_RUN_ATTEMPT}" = "1"
          test "${REPOSITORY_PRIVATE}" = "false"
          version="$(node -p "require('./package.json').version")"
          release_tag="${GITHUB_REF_NAME}"
          if test "${GITHUB_EVENT_NAME}" = "workflow_dispatch"; then
            test "${GITHUB_REF_TYPE}" = "branch"
            test "${GITHUB_REF_NAME}" = "main"
            test "${GITHUB_REF}" = "refs/heads/main"
            protected_main_ref="refs/release-verification/main"
            git fetch --no-tags origin "refs/heads/main:${protected_main_ref}"
            git merge-base --is-ancestor "${GITHUB_SHA}" "${protected_main_ref}"
            release_tag="${DISPATCH_TAG}"
          else
            test "${GITHUB_EVENT_NAME}" = "push"
            test "${GITHUB_REF_TYPE}" = "tag"
          fi
          [[ "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "${release_tag}" = "v${version}"
          verification_ref="refs/release-verification/${release_tag}"
          git fetch --no-tags origin "refs/tags/${release_tag}:${verification_ref}"
          test "$(git cat-file -t "${verification_ref}")" = "tag"
          release_commit="$(git rev-parse "${verification_ref}^{commit}")"
          test "$(git rev-parse HEAD)" = "${release_commit}"
          if test "${GITHUB_EVENT_NAME}" = "push"; then
            test "${release_commit}" = "${GITHUB_SHA}"
          fi
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "${release_commit}" refs/remotes/origin/main
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify extraction and shared-package readiness
        run: node scripts/verify-release-readiness.mjs

      - name: Bind lockfile artifacts to canonical registry metadata
        run: node scripts/verify-lock-registry.mjs

      - name: Install locked dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Audit dependency tree
        run: npm audit --audit-level=high

      - name: Check types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Rebuild tracked readable output
        run: npm run build

      - name: Reject generated-output drift
        run: git diff --exit-code -- dist

      - name: Build exact release tarball
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir release
          npm pack --ignore-scripts --json --pack-destination release > release/pack-result.json
          node -e 'const fs=require("node:fs");const [result]=JSON.parse(fs.readFileSync("release/pack-result.json","utf8"));fs.appendFileSync(process.env.GITHUB_OUTPUT,`tarball=${result.filename}\n`);'

      - name: Verify exact release tarball
        run: node scripts/verify-packed-artifact.mjs "release/${{ steps.pack.outputs.tarball }}" > release/artifact-report.json

      - name: Record exact release checksum
        working-directory: release
        run: sha512sum "${{ steps.pack.outputs.tarball }}" > SHA512SUMS

      - name: Exercise publish metadata without publishing
        run: npm publish "${PWD}/release/${{ steps.pack.outputs.tarball }}" --dry-run --ignore-scripts --access public --registry=https://registry.npmjs.org

      - name: Install and exercise the exact packed client
        shell: bash
        run: |
          set -euo pipefail
          consumer="$(mktemp -d)"
          trap 'rm -rf "${consumer}"' EXIT
          tarball_path="$(realpath "${PWD}/release/${{ steps.pack.outputs.tarball }}")"
          npm install --global --prefix "${consumer}" --ignore-scripts --no-save --package-lock=false "${tarball_path}"
          npm ls --global --prefix "${consumer}" --omit=dev --all --package-lock=false
          node scripts/smoke-packed-client.mjs \
            "${consumer}/lib/node_modules/borgmcp" \
            "${consumer}/bin/borg-mcp"

      - name: Upload tarball for security audit
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-release-${{ steps.release.outputs.version }}
          path: |
            release/${{ steps.pack.outputs.tarball }}
            release/artifact-report.json
            release/SHA512SUMS
          if-no-files-found: error
          retention-days: 7

  publish:
    if: github.event_name == 'push' && github.run_attempt == 1
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/borgmcp/v/${{ needs.verify.outputs.version }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Reject immutable release reruns
        shell: bash
        run: test "${GITHUB_RUN_ATTEMPT}" = "1"

      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Reject checked-out repository npm config
        shell: bash
        run: test ! -e .npmrc

      - name: Set up exact Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org

      - name: Set up exact npm
        shell: bash
        run: |
          set -euo pipefail
          npm_prefix="${RUNNER_TEMP}/npm-11.18.0"
          bootstrap_userconfig="${RUNNER_TEMP}/npm-bootstrap.npmrc"
          bootstrap_cache="${RUNNER_TEMP}/npm-bootstrap-cache"
          : > "${bootstrap_userconfig}"
          NPM_CONFIG_USERCONFIG="${bootstrap_userconfig}" NPM_CONFIG_CACHE="${bootstrap_cache}" \
            npm install --prefix "${npm_prefix}" --ignore-scripts --no-save \
            --registry=https://registry.npmjs.org npm@11.18.0
          exact_npm="${npm_prefix}/node_modules/.bin/npm"
          test "$(NPM_CONFIG_USERCONFIG="${bootstrap_userconfig}" "${exact_npm}" --version)" = "11.18.0"
          test "$(NPM_CONFIG_USERCONFIG="${bootstrap_userconfig}" "${exact_npm}" config get registry)" = "https://registry.npmjs.org/"
          echo "${npm_prefix}/node_modules/.bin" >> "${GITHUB_PATH}"

      - name: Download security-audited tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm-release-${{ needs.verify.outputs.version }}
          path: release

      - name: Verify downloaded checksum
        working-directory: release
        run: sha512sum --check SHA512SUMS

      - name: Re-verify exact release tarball
        run: node scripts/verify-packed-artifact.mjs "release/${{ needs.verify.outputs.tarball }}"

      - name: Verify version availability and ownership
        run: node scripts/verify-registry-release.mjs prepublish "release/${{ needs.verify.outputs.tarball }}"
        env:
          NPM_EXPECTED_OWNER: ${{ vars.NPM_EXPECTED_OWNER }}

      - name: Publish exact audited tarball with provenance
        run: npm publish "${PWD}/release/${{ needs.verify.outputs.tarball }}" --ignore-scripts --access public --provenance --registry=https://registry.npmjs.org

      - name: Verify registry integrity, ownership, and provenance
        run: node scripts/verify-registry-release.mjs postpublish "release/${{ needs.verify.outputs.tarball }}"
        env:
          GITHUB_SHA: ${{ github.sha }}
          NPM_EXPECTED_OWNER: ${{ vars.NPM_EXPECTED_OWNER }}

      - name: Cryptographically verify registry signatures and attestations
        shell: bash
        run: |
          set -euo pipefail
          mkdir registry-verification
          npm install --prefix registry-verification --ignore-scripts --save-exact "borgmcp@${{ needs.verify.outputs.version }}"
          npm audit signatures --prefix registry-verification
